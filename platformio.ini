[env:atoms3]
platform = espressif32
board = m5stack-atoms3
framework = arduino
monitor_speed = 115200
monitor_echo = true
upload_speed = 1500000
; upload_port = COM13
; monitor_port = COM13
;board_build.partitions = partition_3M_app.csv
board_upload.flash_size = 8MB
;board_upload.maximum_size = 3145728
lib_deps =
    M5Unified @ 0.2.17
    h2zero/NimBLE-Arduino @ 2.5.0
build_flags =
    -D CORE_DEBUG_LEVEL=3
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DM5STACK

