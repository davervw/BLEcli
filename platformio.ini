[env:m5stick-c]
platform = espressif32
board = m5stick-c
framework = arduino
monitor_speed = 115200
monitor_echo = true
upload_speed = 1500000

lib_deps =
    M5Unified @ 0.2.17
    h2zero/NimBLE-Arduino @ 2.5.0

monitor_filters = esp32_exception_decoder

board_upload.flash_size = 4MB

build_flags =
    -D CORE_DEBUG_LEVEL=3
    -DM5STACK

[env:m5stamps3]
platform = espressif32
board = m5stack-stamps3
framework = arduino
monitor_speed = 115200
monitor_echo = true
